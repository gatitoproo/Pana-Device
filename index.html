 if (fechaGuardada === hoy && indexGuardado !== null) {

    efectoDecrypt(elemento, frase.texto);

}



function efectoDecrypt(elemento, textoFinal) {

  let iteracion = 0;
  let ultimoSonido = 0;

  const longitud = textoFinal.length;
  const palabras = textoFinal.split(" ").length;

  let velocidad;

  if (palabras <= 80) {
    velocidad = 10; 
  } else if (palabras <= 200) {
    velocidad = 40; 
  } else {
    velocidad = 80;
  }
  
  const intervalo = setInterval(() => {

    elemento.innerHTML = textoFinal
      .split("")
      .map((letra, index) => {

        if (index < iteracion) {
          return textoFinal[index];
        }

        return letras[Math.floor(Math.random() * letras.length)];
      })
      .join("");

    const ahora = Date.now();

    if (iteracion >= textoFinal.length) {
      clearInterval(intervalo);
    }

    iteracion += longitud / 100;

  }, velocidad);
}
